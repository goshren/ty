<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AUV/无人船轨迹监控</title>
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=jVcaNXWO0Yand6t0B8kX8PbNKuNphXgN"></script>
    <style>
        html, body, #allmap { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        /* 隐藏百度地图的 Logo 提升沉浸感（可选） */
        .BMap_cpyCtrl, .anchorBL { display: none; }
    </style>
</head>
<body>
    <div id="allmap"></div>
    <script type="text/javascript">
        // 1. 初始化地图
        var map = new BMap.Map("allmap");
        var defaultPoint = new BMap.Point(120.15, 30.28); // 默认坐标 (例如杭州)
        map.centerAndZoom(defaultPoint, 16);
        map.enableScrollWheelZoom(true);     // 开启鼠标滚轮缩放

        // 2. 初始化机器人标记点 (可以使用自定义图标)
        var marker = new BMap.Marker(defaultPoint);
        map.addOverlay(marker);

        // 3. Qt C++ 将调用的接口函数
        // 接收经纬度 (十进制度数) 并更新标记
        function updateRobotPosition(lon, lat) {
            var newPoint = new BMap.Point(lon, lat);
            marker.setPosition(newPoint);
            map.panTo(newPoint); // 视角跟随机器人
        }
    </script>
</body>
</html>
